<!DOCTYPE html>
<html>
<head>
    <title>Student Result</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        }

        .card{
            width:380px;
            padding:35px;
            border-radius:25px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);
            box-shadow:0 10px 30px rgba(0,0,0,0.5);
            text-align:center;
            color:white;
            border:1px solid rgba(255,255,255,0.2);
        }

        h1{
            color:#00c6ff;
            text-shadow:0 0 10px #00c6ff;
            margin-bottom:10px;
        }

        .student-name{
            font-size:18px;
            margin-bottom:15px;
            color:#ffffff;
            font-weight:bold;
        }

        .circle{
            width:150px;
            height:150px;
            border-radius:50%;
            background:conic-gradient(#00c6ff 0deg,#2c5364 0deg);
            margin:20px auto;
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 0 25px #00c6ff;
        }

        .inner{
            width:115px;
            height:115px;
            background:#0f2027;
            border-radius:50%;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .percent{
            font-size:28px;
            font-weight:900;
            color:#00c6ff;
        }

        .label{
            font-size:12px;
            color:#bbb;
        }

        .scoreBox{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }

        .pass{
            color:#00ff99;
            font-size:24px;
            font-weight:900;
            margin-top:15px;
        }

        .fail{
            color:#ff4d4d;
            font-size:24px;
            font-weight:900;
            margin-top:15px;
        }

        button{
            margin-top:25px;
            padding:12px 25px;
            border:none;
            border-radius:50px;
            background:linear-gradient(45deg,#00c6ff,#0072ff);
            color:white;
            font-size:15px;
            font-weight:bold;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 0 20px #00c6ff;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🎯 RESULT</h1>

    <div class="student-name" id="studentName">
        Student
    </div>

    <div class="circle" id="circle">
        <div class="inner">
            <div class="percent" id="percent">0%</div>
            <div class="label">Percentage</div>
        </div>
    </div>

    <div class="scoreBox">
        Score: <span id="score"></span>
    </div>

    <div id="status"></div>

    <button onclick="goCertificate()">
        🎓 Go To Certificate
    </button>

</div>

<script>

    // Get data from localStorage
    let score = Number(localStorage.getItem("score")) || 0;
    let total = Number(localStorage.getItem("total")) || 10;
    let studentName = localStorage.getItem("studentName") || "Student";

    document.getElementById("studentName").innerText =
        "👨‍🎓 " + studentName;

    let percentage = (score / total) * 100;

    document.getElementById("score").innerText =
        score + " / " + total;

    let circle = document.getElementById("circle");
    let percentText = document.getElementById("percent");

    let current = 0;

    let interval = setInterval(() => {

        if(current <= percentage){

            percentText.innerText =
                current.toFixed(0) + "%";

            let angle = (current / 100) * 360;

            circle.style.background =
                `conic-gradient(
                #00c6ff ${angle}deg,
                #2c5364 ${angle}deg
                )`;

            current++;

        }else{
            clearInterval(interval);
        }

    },15);

    let status = document.getElementById("status");

    if(percentage >= 50){

        status.innerHTML =
        "<div class='pass'>✔ PASS</div>";

    }else{

        status.innerHTML =
        "<div class='fail'>✖ FAIL</div>";

    }

    function goCertificate(){

        if(percentage >= 50){
            window.location.href = "firecertificate.html";
        }else{
            alert("Sorry! Only passed students can get certificates.");
        }

    }

</script>

</body>
</html>
