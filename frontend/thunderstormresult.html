<html>
<head>
    <title>Thunderstorm Result</title>

    <style>
        body{
            margin:0;
            height:100vh;

        .card{

            border:1px solid rgba(255,255,255,0.2);
        }

        h1{
            color:#e1bee7;
            text-shadow:0 0 10px #e1bee7;
            margin-bottom:10px;

        .student-name{

        .circle{
            width:150px;
            height:150px;
            border-radius:50%;
            background:conic-gradient(#e1bee7 0deg,#4a148c 0deg);
            margin:20px auto;
            display:flex;
            justify-content:center;
            align-items:center;
            box-shadow:0 0 25px #e1bee7;
        }

        .inner{
            width:115px;

            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
        }

        .percent{
            font-size:28px;
            font-weight:900;
            color:#e1bee7;
        }

        .label{
            font-size:12px;
            color:#ddd;
        }

        .scoreBox{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }

        .pass{
            color:#00ff99;
            font-size:24px;
            font-weight:900;
            margin-top:15px;
        }

        .fail{
            color:#ff4d4d;
            font-size:24px;

        button{
            margin-top:25px;

            transition:.3s;
        }

        button:hover{
            transform:scale(1.05);

        }
    </style>
</head>

<body>

<div class="card">

    <h1>⛈️ THUNDERSTORM RESULT</h1>

    <div class="student-name" id="studentName"></div>

    <div class="circle" id="circle">
        <div class="inner">
            <div class="percent" id="percent">0%</div>
            <div class="label">Thunderstorm Score</div>
        </div>
    </div>

    <div class="scoreBox">
        Score: <span id="score"></span>
    </div>

    <div id="status"></div>

    <button onclick="goCertificate()">
        🎓 Go To Certificate
    </button>

</div>

<script>

let score = Number(localStorage.getItem("score")) || 0;
let total = Number(localStorage.getItem("total")) || 10;
let studentName = localStorage.getItem("studentName") || "Student";

document.getElementById("studentName").innerText =
    "👨‍🎓 " + studentName;

let percentage = (score / total) * 100;

document.getElementById("score").innerText =
    score + " / " + total;

let circle = document.getElementById("circle");
let percentText = document.getElementById("percent");

let current = 0;

let interval = setInterval(() => {

    if(current <= percentage){

        percentText.innerText =
            current.toFixed(0) + "%";

        let angle = (current / 100) * 360;

        circle.style.background =
            `conic-gradient(
            #e1bee7 ${angle}deg,
            #4a148c ${angle}deg
            )`;

        current++;

    }else{
        clearInterval(interval);
    }

},15);

let status = document.getElementById("status");

if(percentage >= 50){

    status.innerHTML =
    "<div class='pass'>✔ PASS</div>";

}else{

    status.innerHTML =
    "<div class='fail'>✖ FAIL</div>";

}

function goCertificate(){

    if(percentage >= 50){
        window.location.href = "thunderstormcertificate.html";
    }else{
        alert("Sorry! Only passed students can get certificates.");
    }

}

</script>

</body>
</html>
