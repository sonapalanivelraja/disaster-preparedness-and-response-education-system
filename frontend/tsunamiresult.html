<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tsunami Assessment Result</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#001f3f,#005792,#00a8cc);
}

.card{
    width:400px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
    border:1px solid rgba(255,255,255,0.2);
}

h1{
    color:#00e5ff;
    text-shadow:0 0 15px #00e5ff;
    margin-bottom:10px;
}

.student-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
}

.circle{
    width:160px;
    height:160px;
    border-radius:50%;
    background:conic-gradient(#00e5ff 0deg,#003554 0deg);
    margin:20px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 30px #00e5ff;
}

.inner{
    width:120px;
    height:120px;
    background:#001f3f;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.percent{
    font-size:30px;
    font-weight:900;
    color:#00e5ff;
}

.label{
    font-size:12px;
    color:#ccc;
}

.scoreBox{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.pass{
    color:#00ff99;
    font-size:24px;
    font-weight:900;
    margin-top:15px;
}

.fail{
    color:#ff4d4d;
    font-size:24px;
    font-weight:900;
    margin-top:15px;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:50px;
    background:linear-gradient(45deg,#00e5ff,#0077ff);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00e5ff;
}

.wave{
    font-size:35px;
    animation:waveMove 2s infinite;
}

@keyframes waveMove{
    0%{transform:translateY(0);}
    50%{transform:translateY(-8px);}
    100%{transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">

    <div class="wave">🌊</div>

    <h1>TSUNAMI RESULT</h1>

    <div class="student-name" id="studentName">
        👨‍🎓 Student
    </div>

    <div class="circle" id="circle">
        <div class="inner">
            <div class="percent" id="percent">0%</div>
            <div class="label">Percentage</div>
        </div>
    </div>

    <div class="scoreBox">
        Score: <span id="score"></span>
    </div>

    <div id="status"></div>

    <button onclick="goCertificate()">
        🎓 Get Certificate
    </button>

</div>

<script>

// Get Data
let score = Number(localStorage.getItem("score")) || 0;
let total = Number(localStorage.getItem("total")) || 10;
let studentName = localStorage.getItem("studentName") || "Student";

document.getElementById("studentName").innerText =
"👨‍🎓 " + studentName;

let percentage = (score / total) * 100;

document.getElementById("score").innerText =
score + " / " + total;

let circle = document.getElementById("circle");
let percentText = document.getElementById("percent");

let current = 0;

let interval = setInterval(() => {

    if(current <= percentage){

        percentText.innerText =
        current.toFixed(0) + "%";

        let angle = (current / 100) * 360;

        circle.style.background =
        `conic-gradient(
            #00e5ff ${angle}deg,
            #003554 ${angle}deg
        )`;

        current++;

    }else{
        clearInterval(interval);
    }

},15);

let status = document.getElementById("status");

if(percentage >= 50){

    status.innerHTML =
    "<div class='pass'>✔ PASS</div>";

}else{

    status.innerHTML =
    "<div class='fail'>✖ FAIL</div>";

}

function goCertificate(){

    if(percentage >= 50){

        window.location.href =
        "tsunamicertificate.html";

    }else{

        alert(
        "Sorry! Only passed students can get certificates."
        );

    }

}

</script>

</body>
</html>
