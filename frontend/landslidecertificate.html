<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    font-family:'Segoe UI',sans-serif;

    padding:30px;

}

.wrapper{

    text-align:center;

}

.cert{

    width:1300px;

    min-height:620px;

    background:#fff;

    border:18px solid gold;

    border-radius:8px;

    position:relative;

    padding:40px;

    box-shadow:0 0 30px rgba(0,0,0,.4);

}

.logo{
    display:block;
    margin:0 auto;
    width:200px;
}
.title{

    font-size:42px;

    font-weight:900;

    color:goldenrod;

    letter-spacing:2px;

}

.medal{

    font-size:24px;

    font-weight:bold;

    margin-top:15px;

}

.system{

    margin-top:12px;

    font-size:18px;

    color:#555;

}

.text{

    margin-top:28px;

    font-size:22px;

    color:#444;

}

.name{

    margin-top:18px;

    font-size:40px;

    color:#0077b6;

    font-weight:bold;

}

.course{

    margin-top:18px;

    font-size:24px;

    color:#023e8a;

    font-weight:bold;

}

.score{

    margin-top:18px;

    font-size:20px;

    font-weight:bold;

    color:#222;

}

.date{

    margin-top:18px;

    font-size:18px;

}

.qr{

    position:absolute;

    left:35px;

    bottom:30px;

}
.signature{
    position:absolute;
    right:35px;
    bottom:20px;
    text-align:center;
    line-height:1.1;
}

.signature img{
    width:130px;
    display:block;
    margin:0 auto -8px auto;
}

.signature hr{
    width:170px;
    margin:0 auto;
}

.signature b{
    display:block;
    margin-top:2px;
}

.signature small{
    display:block;
    margin-top:0;
}
button{

    margin-top:20px;

    padding:12px 28px;

    background:#0077ff;

    color:#fff;

    border:none;

    border-radius:30px;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

}

button:hover{

    background:#0056cc;

}

@media print{

button{

display:none;

}

body{

background:white;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div id="certificate" class="cert">

<img src="NDMA-1.jpg" class="logo">

<h1 class="title">

CERTIFICATE OF COMPLETION

</h1>

<div id="medalText" class="medal"></div>

<div class="system">

Disaster Preparedness and Response Education System

</div>
<div class="text">
    This is to certify that
</div>

<div id="studentName" class="name">
    Student Name
</div>

<div class="text">
    has successfully completed the course
</div>

<div class="course">
    Disaster Management System - landslide Awareness
</div>

<div id="scoreText" class="score"></div>

<div id="date" class="date"></div>

<div id="qrcode" class="qr"></div>

<div class="signature">
<img src="signatures-download-clipart-29.png">
<hr>
<b>Mr. Vinothkumar C</b>
<small>Project Guide / Authorized Signatory</small>

</div>

</div>

<button onclick="window.print()">
    ⬇️ Download Certificate
</button>

</div>

<script>

let studentName =
localStorage.getItem("studentName") || "Student";

const currentUser =
JSON.parse(localStorage.getItem("disastersafe_current_user"));

if(currentUser){
    studentName = currentUser.name;
}

let score =
Number(localStorage.getItem("score")) || 0;

let total =
Number(localStorage.getItem("total")) || 10;

let percentage =
((score / total) * 100).toFixed(0);

document.getElementById("studentName").textContent =
studentName;

document.getElementById("scoreText").innerHTML =
"Score : " + score + " / " + total +
" &nbsp;&nbsp; | &nbsp;&nbsp; Percentage : " + percentage + "%";

let medal =
document.getElementById("medalText");

let cert =
document.getElementById("certificate");
if (percentage >= 85) {

    cert.classList.add("gold");
    medal.textContent = "🥇 GOLD CERTIFICATE";

}
else if (percentage >= 70) {

    cert.classList.add("silver");
    medal.textContent = "🥈 SILVER CERTIFICATE";

}
else {

    cert.classList.add("bronze");
    medal.textContent = "🥉 BRONZE CERTIFICATE";

}

let today = new Date();

document.getElementById("date").innerHTML =
"Date : " +
today.toLocaleDateString("en-IN",{
    day:"numeric",
    month:"long",
    year:"numeric"
});

new QRCode(
    document.getElementById("qrcode"),
    {
        text:
        "Student : " + studentName +
        "\nScore : " + score + "/" + total +
        "\nPercentage : " + percentage + "%",

        width:100,
        height:100
    }
);

if (percentage >= 85) {
    cert.style.borderColor = "gold";
    document.querySelector(".title").style.color = "goldenrod";
}
else if (percentage >= 70) {
    cert.style.borderColor = "silver";
    document.querySelector(".title").style.color = "#808080";
}
else {
    cert.style.borderColor = "#cd7f32";
    document.querySelector(".title").style.color = "#cd7f32";
}

</script>

</body>

</html>
